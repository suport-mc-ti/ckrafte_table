name: Bug report
description: Reporta un error reproducible
title: "bug: "
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: Que paso
      description: Describe el error y el resultado esperado.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Pasos para reproducir
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Entorno
      description: OS, Python, Node, proveedor, modelo.
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacidad
      options:
        - label: Confirme que no incluye secretos ni datos personales
          required: true
